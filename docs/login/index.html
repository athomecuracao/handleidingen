<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inloggen — At Home Curaçao Handleidingen</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #424242 0%, #212121 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
    }
    .login-card {
      background: white;
      border-radius: 12px;
      padding: 48px 40px;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      text-align: center;
      border-top: 4px solid #E63290;
    }
    .login-card .logo {
      margin-bottom: 20px;
    }
    .login-card .logo img {
      height: 48px;
      width: auto;
    }
    .login-card h1 {
      font-size: 22px;
      font-weight: 700;
      color: #424242;
      margin-bottom: 8px;
    }
    .login-card .subtitle {
      color: #666;
      font-size: 13px;
      margin-bottom: 32px;
    }
    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #424242;
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      font-family: 'Montserrat', sans-serif;
      transition: border-color 0.2s;
      outline: none;
    }
    .form-group input:focus {
      border-color: #00B0E2;
    }
    .error {
      color: #E63290;
      font-size: 12px;
      font-weight: 500;
      margin-top: 6px;
      display: none;
    }
    .btn {
      width: 100%;
      padding: 14px;
      background: #E63290;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Montserrat', sans-serif;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: #c42a7a; }
    .footer {
      margin-top: 24px;
      color: #999;
      font-size: 11px;
    }
    .color-bar {
      display: flex;
      height: 4px;
      margin-top: 32px;
      border-radius: 2px;
      overflow: hidden;
    }
    .color-bar span {
      flex: 1;
    }
    .color-bar .c1 { background: #E63290; }
    .color-bar .c2 { background: #F8D931; }
    .color-bar .c3 { background: #00B0E2; }
    .color-bar .c4 { background: #424242; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">
      <img src="../images/logo-athome.png" alt="At Home Curaçao">
    </div>
    <h1>Handleidingen</h1>
    <p class="subtitle">Voer het wachtwoord in om de handleidingen te bekijken</p>
    <form id="loginForm">
      <div class="form-group">
        <label for="password">Wachtwoord</label>
        <input type="password" id="password" placeholder="Wachtwoord invullen..." autofocus>
        <p class="error" id="errorMsg">Onjuist wachtwoord. Neem contact op met je beheerder.</p>
      </div>
      <button type="submit" class="btn">Inloggen</button>
    </form>
    <div class="color-bar">
      <span class="c1"></span>
      <span class="c2"></span>
      <span class="c3"></span>
      <span class="c4"></span>
    </div>
    <p class="footer">Alleen voor medewerkers van At Home Curaçao</p>
  </div>

  <script>
    const VALID_HASH = "b353b42c4c7902afdd13232f4028a6337266f33e73f443b3fb8ffb4064fa926f";
    const STORAGE_KEY = "athome_auth";

    async function sha256(message) {
      const msgBuffer = new TextEncoder().encode(message);
      const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const hash = await sha256(password);

      if (hash === VALID_HASH) {
        sessionStorage.setItem(STORAGE_KEY, VALID_HASH);
        const basePath = window.location.pathname.replace(/login\/?$/, '');
        window.location.href = basePath || '/';
      } else {
        document.getElementById('errorMsg').style.display = 'block';
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
      }
    });
  </script>
</body>
</html>
