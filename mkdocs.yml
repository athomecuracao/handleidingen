site_name: At Home Curaçao — Handleidingen
site_url: https://athomecuracao.github.io/handleidingen
site_description: Handleidingen voor medewerkers van At Home Curaçao

theme:
  name: material
  language: nl
  custom_dir: overrides
  palette:
    - scheme: default
      primary: teal
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Donker thema
    - scheme: slate
      primary: teal
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Licht thema
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.tabs.link
    - toc.integrate
  icon:
    logo: material/home-city
  font:
    text: Roboto
    code: Roboto Mono

plugins:
  - search:
      lang: nl

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - attr_list
  - md_in_html
  - tables
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

